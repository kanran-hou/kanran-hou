<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CopyMind 运营后台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --primary: #4A7CF7;
    --success: #22C55E;
    --warning: #F59E0B;
    --danger: #EF4444;
    --bg: #f0f2f5;
    --card-bg: #fff;
    --text: #1f2937;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); }
  .sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100vh; background: #1a1a2e; color: #fff; padding-top: 20px; z-index: 100; }
  .sidebar h2 { padding: 0 20px 20px; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
  .sidebar .nav-item { padding: 14px 20px; cursor: pointer; transition: background .2s; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.7); }
  .sidebar .nav-item:hover, .sidebar .nav-item.active { background: rgba(74,124,247,.3); color: #fff; }
  .main { margin-left: 220px; padding: 24px; min-height: 100vh; }
  .page-title { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
  .page-section { display: none; }
  .page-section.active { display: block; }

  /* Card Grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .value.green { color: var(--success); }
  .stat-card .value.blue { color: var(--primary); }
  .stat-card .value.orange { color: var(--warning); }
  .stat-card .value.red { color: var(--danger); }

  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-box { background: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .chart-box h3 { font-size: 15px; margin-bottom: 12px; }
  .chart-container { height: 280px; }

  /* Tables */
  .table-wrap { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 12px 16px; background: #f9fafb; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  td { padding: 12px 16px; font-size: 14px; border-top: 1px solid var(--border); }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
  .badge.tag-S { background: #fce4e4; color: #EF4444; }
  .badge.tag-A { background: #fef3c7; color: #F59E0B; }
  .badge.tag-B { background: #dbeafe; color: #4A7CF7; }
  .badge.tag-C { background: #e5e7eb; color: #6b7280; }

  .btn { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { opacity: .85; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-success { background: var(--success); color: #fff; }

  .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-bar select, .filter-bar input { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }

  .defect-list { display: grid; gap: 12px; }
  .defect-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 14px 18px; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .defect-item .info { display: flex; align-items: center; gap: 12px; }
  .defect-item .bar-wrap { width: 200px; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
  .defect-item .bar { height: 100%; border-radius: 4px; }
  .defect-item .num { font-weight: 700; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="sidebar">
  <h2>CopyMind</h2>
  <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 数据看板</div>
  <div class="nav-item" data-tab="feedback" onclick="switchTab('feedback')">💬 反馈管理</div>
  <div class="nav-item" data-tab="users" onclick="switchTab('users')">👥 用户管理</div>
  <div class="nav-item" data-tab="clusters" onclick="switchTab('clusters')">📋 聚类报告</div>
</div>

<div class="main">
  <!-- Dashboard -->
  <div id="tab-dashboard" class="page-section active">
    <div class="page-title">运营数据看板</div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="chart-row">
      <div class="chart-box"><h3>近 7 日分析趋势</h3><div class="chart-container" id="trendChart"></div></div>
      <div class="chart-box"><h3>各赛道占比</h3><div class="chart-container" id="trackChart"></div></div>
    </div>
    <div class="page-title">高频缺陷类型</div>
    <div class="defect-list" id="defectList"></div>
  </div>

  <!-- Feedback -->
  <div id="tab-feedback" class="page-section">
    <div class="page-title">用户反馈管理</div>
    <div class="filter-bar">
      <select id="feedbackTypeFilter" onchange="loadFeedback()">
        <option value="">全部类型</option>
        <option value="analysis_inaccurate">分析不准确</option>
        <option value="suggestion_invalid">优化建议无效</option>
        <option value="other">其他</option>
      </select>
      <button class="btn btn-primary" onclick="loadFeedback()">刷新</button>
    </div>
    <div class="table-wrap" id="feedbackTable"></div>
  </div>

  <!-- Users -->
  <div id="tab-users" class="page-section">
    <div class="page-title">用户分层管理</div>
    <div class="stats-grid" id="userStatsGrid" style="margin-bottom:20px"></div>
    <div class="filter-bar">
      <textarea id="batchUserInput" placeholder="输入用户 openid（每行一个，最多 50 个）" style="width:400px;height:100px;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px"></textarea>
      <select id="batchTierSelect"><option value="frequent">高频用户</option><option value="vip">VIP</option></select>
      <button class="btn btn-primary" onclick="batchGrant()">批量开通权限</button>
    </div>
    <div id="batchResult" style="margin-top:10px"></div>
  </div>

  <!-- Clusters -->
  <div id="tab-clusters" class="page-section">
    <div class="page-title">反馈聚类报告</div>
    <div id="clusterContent"><p style="color:var(--text-secondary)">加载中…</p></div>
  </div>
</div>

<script>
const API_BASE = '/api/v1/admin';

function switchTab(tab) {
  document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');
  if (tab === 'dashboard') loadDashboard();
  if (tab === 'feedback') loadFeedback();
  if (tab === 'users') loadUserStats();
  if (tab === 'clusters') loadClusters();
}

async function apiGet(path) {
  try {
    const r = await fetch(API_BASE + path);
    return await r.json();
  } catch(e) { return { code: -1, message: e.message, data: null }; }
}

async function apiPost(path, body) {
  try {
    const r = await fetch(API_BASE + path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    return await r.json();
  } catch(e) { return { code: -1, message: e.message, data: null }; }
}

/* ========== Dashboard ========== */
async function loadDashboard() {
  const res = await apiGet('/dashboard');
  if (!res.data) return;
  const d = res.data;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="label">今日分析</div><div class="value blue">${d.total_analysis_today}</div></div>
    <div class="stat-card"><div class="label">本周分析</div><div class="value blue">${d.total_analysis_week}</div></div>
    <div class="stat-card"><div class="label">本月分析</div><div class="value blue">${d.total_analysis_month}</div></div>
    <div class="stat-card"><div class="label">累计分析</div><div class="value blue">${d.total_analysis_all}</div></div>
    <div class="stat-card"><div class="label">平均得分</div><div class="value green">${d.avg_overall_score}</div></div>
    <div class="stat-card"><div class="label">日活跃</div><div class="value green">${d.active_users_daily}</div></div>
    <div class="stat-card"><div class="label">周活跃</div><div class="value green">${d.active_users_weekly}</div></div>
    <div class="stat-card"><div class="label">月活跃</div><div class="value green">${d.active_users_monthly}</div></div>
  `;

  // Trend chart
  const trend = await apiGet('/dashboard/trend?days=7');
  if (trend.data) {
    const tc = echarts.init(document.getElementById('trendChart'));
    tc.setOption({
      tooltip: { trigger:'axis' },
      grid: { left:'3%', right:'3%', bottom:'10%', top:'10%', containLabel:true },
      xAxis: { type:'category', data: trend.data.map(t=>t.date.slice(5)), axisLabel:{ fontSize:11 } },
      yAxis: { type:'value', minInterval:1 },
      series: [{ type:'line', data: trend.data.map(t=>t.count), smooth:true, lineStyle:{color:'#4A7CF7',width:2}, areaStyle:{color:'rgba(74,124,247,.1)'}, symbol:'circle', symbolSize:6 }]
    });
    window.addEventListener('resize', ()=>tc.resize());
  }

  // Track pie
  const trackNames = { xiaohongshu:'小红书', ecommerce:'电商', local_tourism:'文旅', short_video:'短视频' };
  const trackColors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4'];
  const tc2 = echarts.init(document.getElementById('trackChart'));
  tc2.setOption({
    tooltip: { trigger:'item', formatter:'{b}: {c} ({d}%)' },
    series: [{
      type:'pie', radius:['35%','55%'], center:['50%','50%'],
      data: Object.entries(d.track_distribution).map(([k,v],i) => ({ name: trackNames[k]||k, value:v, itemStyle:{color:trackColors[i]} })),
      label: { fontSize:12 }, emphasis: { itemStyle:{shadowBlur:10,shadowColor:'rgba(0,0,0,.2)'} }
    }]
  });
  window.addEventListener('resize', ()=>tc2.resize());

  // Defect list
  const defects = await apiGet('/dashboard/defects');
  if (defects.data) {
    const maxCount = Math.max(...defects.data.map(d=>d.low_score_count), 1);
    document.getElementById('defectList').innerHTML = defects.data.map(d => {
      const pct = (d.low_score_count / maxCount * 100).toFixed(0);
      const color = d.low_score_count > maxCount/2 ? '#EF4444' : d.low_score_count > maxCount/4 ? '#F59E0B' : '#4A7CF7';
      return `<div class="defect-item">
        <div class="info"><span style="font-weight:600">${d.name}</span><div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${color}"></div></div></div>
        <div class="num">${d.low_score_count} 条 (${d.percentage}%)</div>
      </div>`;
    }).join('');
  }
}

/* ========== Feedback ========== */
async function loadFeedback() {
  const type = document.getElementById('feedbackTypeFilter').value;
  let url = '/feedback?page=1&page_size=50';
  if (type) url += '&feedback_type=' + type;
  const res = await apiGet(url);
  if (!res.data) return;
  const items = res.data.items || [];
  document.getElementById('feedbackTable').innerHTML = items.length ? `<table><tr><th>ID</th><th>用户</th><th>类型</th><th>内容</th><th>时间</th><th>操作</th></tr>${
    items.map(f => `<tr>
      <td>${f.id}</td><td style="max-width:100px;overflow:hidden;text-overflow:ellipsis">${f.user_openid}</td>
      <td>${({analysis_inaccurate:'分析不准确',suggestion_invalid:'优化建议无效',other:'其他'})[f.feedback_type]||f.feedback_type}</td>
      <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis">${f.feedback_text||'-'}</td>
      <td>${f.created_at?.slice(0,16)||''}</td>
      <td><button class="btn btn-success btn-sm" onclick="markProcessed(${f.id})">标记处理</button> <button class="btn btn-sm" style="background:#e5e7eb" onclick="deleteFeedback(${f.id})">删除</button></td>
    </tr>`).join('')
  }</table>` : '<p style="padding:20px;text-align:center;color:var(--text-secondary)">暂无反馈记录</p>';
}

async function markProcessed(id) {
  await fetch(`/api/v1/admin/feedback/${id}/processed`, { method:'PATCH' });
  loadFeedback();
}

async function deleteFeedback(id) {
  if (!confirm('确认删除？')) return;
  await fetch(`/api/v1/admin/feedback/${id}`, { method:'DELETE' });
  loadFeedback();
}

/* ========== Users ========== */
async function loadUserStats() {
  const res = await apiGet('/users/stats');
  if (!res.data) return;
  document.getElementById('userStatsGrid').innerHTML = `
    <div class="stat-card"><div class="label">普通用户</div><div class="value blue">${res.data.normal||0}</div></div>
    <div class="stat-card"><div class="label">高频用户</div><div class="value green">${res.data.frequent||0}</div></div>
    <div class="stat-card"><div class="label">VIP</div><div class="value orange">${res.data.vip||0}</div></div>
    <div class="stat-card"><div class="label">总计</div><div class="value">${res.data.total||0}</div></div>
  `;
}

async function batchGrant() {
  const input = document.getElementById('batchUserInput').value.trim();
  if (!input) { alert('请输入用户 openid'); return; }
  const openids = input.split('\n').map(s=>s.trim()).filter(Boolean);
  if (openids.length > 50) { alert('最多 50 个用户'); return; }
  const tier = document.getElementById('batchTierSelect').value;
  const res = await apiPost('/users/batch', { user_openids: openids, tier });
  document.getElementById('batchResult').innerHTML = `<span style="color:var(--success)">${res.message||'操作完成'}</span>`;
  loadUserStats();
}

/* ========== Clusters ========== */
async function loadClusters() {
  const res = await apiGet('/clusters');
  const data = res.data || [];
  if (!data.length) {
    document.getElementById('clusterContent').innerHTML = '<p style="color:var(--text-secondary)">暂无聚类数据，每周一凌晨 4:00 自动生成</p>';
    return;
  }
  const weeks = [...new Set(data.map(d=>d.created_week))];
  let html = weeks.map(week => {
    const items = data.filter(d=>d.created_week===week);
    return `<div style="background:var(--card-bg);border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <h3 style="margin-bottom:12px">📅 ${week}</h3>
      ${items.map((c,i) => `<div style="margin-bottom:10px">
        <span style="font-weight:600">聚类 ${c.cluster_id}：${c.cluster_label||'未命名'}</span>
        <span style="color:var(--text-secondary);margin-left:8px">(${c.sample_count} 条)</span>
        <div style="font-size:13px;color:var(--text-secondary);margin-top:4px">${(c.sample_texts||[]).slice(0,3).map(t=>'“'+t.slice(0,40)+'”').join('、')}</div>
      </div>`).join('')}
    </div>`;
  }).join('');
  document.getElementById('clusterContent').innerHTML = html;
}

// Init
loadDashboard();
</script>
</body>
</html>
